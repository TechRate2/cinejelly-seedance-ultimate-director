<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title>Seedance 2.0 skill map</title>
  <desc>A grouped map of the root Seedance skill, core pipeline skills, governance skills, vocabulary skills, and reference files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#020617"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <style>
      .h{font:800 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}
      .group{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#e2e8f0}
      .txt{font:600 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .muted{font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#94a3b8}
      .root{fill:#0f172a;stroke:#38bdf8;stroke-width:3;rx:24}
      .card{fill:#111827;stroke:#334155;stroke-width:1.2;rx:14}
      .core{stroke:#22d3ee}.gov{stroke:#fb7185}.voc{stroke:#a78bfa}.ref{stroke:#22c55e}
      .line{stroke:#475569;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="64" class="h">Seedance 2.0 Skill Constellation</text>
  <rect x="440" y="92" width="320" height="86" class="root"/>
  <text x="515" y="130" class="group">seedance-20</text>
  <text x="486" y="156" class="muted">router · status rule · prompt principles</text>
  <line x1="600" y1="178" x2="600" y2="226" class="line"/>
  <text x="60" y="242" class="group">Core Pipeline</text>
  <text x="60" y="500" class="group">Governance + Quality</text>
  <text x="760" y="242" class="group">Vocabulary + Examples</text>
  <text x="760" y="500" class="group">References</text>
  <g>
    <rect x="60" y="270" width="190" height="44" class="card core"/><text x="78" y="297" class="txt">interview</text>
    <rect x="270" y="270" width="190" height="44" class="card core"/><text x="288" y="297" class="txt">prompt</text>
    <rect x="480" y="270" width="190" height="44" class="card core"/><text x="498" y="297" class="txt">prompt-short</text>
    <rect x="60" y="330" width="190" height="44" class="card core"/><text x="78" y="357" class="txt">camera</text>
    <rect x="270" y="330" width="190" height="44" class="card core"/><text x="288" y="357" class="txt">motion</text>
    <rect x="480" y="330" width="190" height="44" class="card core"/><text x="498" y="357" class="txt">lighting</text>
    <rect x="60" y="390" width="190" height="44" class="card core"/><text x="78" y="417" class="txt">characters</text>
    <rect x="270" y="390" width="190" height="44" class="card core"/><text x="288" y="417" class="txt">style</text>
    <rect x="480" y="390" width="190" height="44" class="card core"/><text x="498" y="417" class="txt">audio / pipeline</text>
  </g>
  <g>
    <rect x="60" y="530" width="190" height="44" class="card gov"/><text x="78" y="557" class="txt">copyright</text>
    <rect x="270" y="530" width="190" height="44" class="card gov"/><text x="288" y="557" class="txt">filter</text>
    <rect x="480" y="530" width="190" height="44" class="card gov"/><text x="498" y="557" class="txt">anti-slop</text>
    <rect x="60" y="590" width="190" height="44" class="card gov"/><text x="78" y="617" class="txt">troubleshoot</text>
    <rect x="270" y="590" width="190" height="44" class="card gov"/><text x="288" y="617" class="txt">recipes</text>
    <rect x="480" y="590" width="190" height="44" class="card gov"/><text x="498" y="617" class="txt">vfx</text>
  </g>
  <g>
    <rect x="760" y="270" width="160" height="44" class="card voc"/><text x="778" y="297" class="txt">vocab-zh</text>
    <rect x="940" y="270" width="160" height="44" class="card voc"/><text x="958" y="297" class="txt">vocab-ja</text>
    <rect x="760" y="330" width="160" height="44" class="card voc"/><text x="778" y="357" class="txt">vocab-ko</text>
    <rect x="940" y="330" width="160" height="44" class="card voc"/><text x="958" y="357" class="txt">vocab-es</text>
    <rect x="760" y="390" width="160" height="44" class="card voc"/><text x="778" y="417" class="txt">vocab-ru</text>
    <rect x="940" y="390" width="160" height="44" class="card voc"/><text x="958" y="417" class="txt">examples-zh</text>
  </g>
  <g>
    <rect x="760" y="530" width="160" height="44" class="card ref"/><text x="778" y="557" class="txt">api-status</text>
    <rect x="940" y="530" width="160" height="44" class="card ref"/><text x="958" y="557" class="txt">quick-ref</text>
    <rect x="760" y="590" width="160" height="44" class="card ref"/><text x="778" y="617" class="txt">i2v-guide</text>
    <rect x="940" y="590" width="160" height="44" class="card ref"/><text x="958" y="617" class="txt">source-registry</text>
    <rect x="760" y="650" width="160" height="44" class="card ref"/><text x="778" y="677" class="txt">audio-guide</text>
    <rect x="940" y="650" width="160" height="44" class="card ref"/><text x="958" y="677" class="txt">design-system</text>
  </g>
</svg>
