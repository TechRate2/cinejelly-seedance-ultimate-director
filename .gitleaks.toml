title = "CineJelly Secret Scanning Rules"

[[rules]]
id = "atlascloud-api-key"
description = "Atlas Cloud API key or bearer token assignment"
regex = '''(?i)(atlascloud[_-]?api[_-]?key|atlascLOUD_api_key|authorization:\s*bearer)\s*[:=]\s*['"]?[A-Za-z0-9_\-]{20,}'''
tags = ["key", "atlascloud"]

[[rules]]
id = "generic-secret-assignment"
description = "Generic secret, token, password, or private key assignment"
regex = '''(?i)(api[_-]?key|secret|token|password|private[_-]?key)\s*[:=]\s*['"][^'"]{12,}['"]'''
tags = ["secret", "generic"]

[[rules]]
id = "openai-style-key"
description = "OpenAI-style API key pattern"
regex = '''sk-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "openai-compatible"]

[[rules]]
id = "private-key-block"
description = "Private key material"
regex = '''-----BEGIN [A-Z ]*PRIVATE KEY-----'''
tags = ["key", "private"]

[allowlist]
description = "Allow documentation placeholders only"
regexes = [
  '''your-api-key''',
  '''YOUR_API_KEY''',
  '''your-api-key-here''',
  '''<asset_id>''',
  '''<ASSET_ID>'''
]

